<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>케이팝 아이돌 지형도</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f5f0e8;overflow:hidden;width:100vw;height:100vh;font-family:'Pretendard Variable',Pretendard,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;}
canvas{display:block;cursor:grab;}
canvas.drag{cursor:grabbing;}
#ui{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:5;}
#titl{position:absolute;top:18px;left:0;right:0;text-align:center;font-size:11px;color:#ccc0b0;letter-spacing:0.14em;}
#hint{position:absolute;bottom:18px;right:18px;font-size:9px;color:#d0c4b4;letter-spacing:0.04em;}
#lang-sw{position:absolute;top:11px;left:14px;width:76px;height:32px;background:rgba(210,200,188,0.38);border-radius:16px;box-shadow:inset 0 1.5px 4px rgba(100,80,60,0.2);cursor:pointer;display:flex;align-items:center;padding:3px;box-sizing:border-box;pointer-events:all;}
#knob{width:26px;height:26px;border-radius:13px;background:rgba(250,246,240,0.96);box-shadow:0 1.5px 4px rgba(100,80,60,0.24);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#7a6858;transition:transform 0.22s cubic-bezier(0.34,1.56,0.64,1);flex-shrink:0;user-select:none;}
#knob.en{transform:translateX(44px);}
#sw-en{position:absolute;right:10px;font-size:10px;color:rgba(140,120,100,0.65);transition:opacity .15s;pointer-events:none;}
#lang-sw.en #sw-en{opacity:0;}
#mode-sw{position:absolute;top:11px;left:100px;width:86px;height:32px;background:rgba(210,200,188,0.38);border-radius:16px;box-shadow:inset 0 1.5px 4px rgba(100,80,60,0.2);cursor:pointer;display:flex;align-items:center;padding:3px;box-sizing:border-box;pointer-events:all;}
#mode-knob{width:36px;height:26px;border-radius:13px;background:rgba(250,246,240,0.96);box-shadow:0 1.5px 4px rgba(100,80,60,0.24);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#7a6858;letter-spacing:0.04em;transition:transform 0.22s cubic-bezier(0.34,1.56,0.64,1);flex-shrink:0;user-select:none;}
#mode-knob.night{transform:translateX(44px);}
#mode-label{position:absolute;right:8px;font-size:9px;font-weight:700;letter-spacing:0.04em;color:rgba(140,120,100,0.65);pointer-events:none;transition:opacity .15s;opacity:1;}
#mode-sw.night #mode-label{opacity:0;}
body.night{background:#1a1e2e;}
body.night #ui #titl{color:rgba(180,190,215,0.5);}
body.night #ui #hint{color:rgba(160,170,200,0.4);}
body.night #mode-sw{background:rgba(40,50,80,0.55);box-shadow:inset 0 1.5px 4px rgba(0,0,0,0.4);}
body.night #mode-knob{background:rgba(40,55,90,0.95);color:#a0b0d0;box-shadow:0 1.5px 4px rgba(0,0,0,0.5);}
body.night #mode-label{color:rgba(140,160,200,0.5);}
body.night #lang-sw{background:rgba(40,50,80,0.55);box-shadow:inset 0 1.5px 4px rgba(0,0,0,0.4);}
body.night #knob{background:rgba(40,55,90,0.95);color:#a0b0d0;box-shadow:0 1.5px 4px rgba(0,0,0,0.5);}
body.night #sw-en{color:rgba(140,160,200,0.5);}
/* ── Glass Card Base ─────────────────────────────────────── */
#tt,#gc,#lc{
  background:rgba(252,249,244,0.52);
  backdrop-filter:blur(36px) saturate(200%);
  -webkit-backdrop-filter:blur(36px) saturate(200%);
  border:0.5px solid rgba(255,255,255,0.82);
  border-radius:16px;
  box-shadow:0 1.5px 0 rgba(255,255,255,0.95) inset,0 8px 30px rgba(80,58,38,0.13),0 2px 6px rgba(80,58,38,0.07);
}
body.night #tt,body.night #gc,body.night #lc{
  background:rgba(16,20,36,0.58);
  border-color:rgba(255,255,255,0.10);
  box-shadow:0 1px 0 rgba(255,255,255,0.06) inset,0 8px 32px rgba(0,0,0,0.55);
}
/* ── Member Tooltip ──────────────────────────────────────── */
#tt{position:fixed;display:none;max-width:206px;padding:13px 15px 12px;font-size:12px;line-height:1.55;color:#4a3c32;z-index:20;pointer-events:all;}
#ttx{position:absolute;top:9px;right:11px;font-size:15px;color:rgba(158,142,128,0.5);cursor:pointer;line-height:1;}
.tn{font-size:14px;font-weight:700;color:#241c14;margin-bottom:3px;padding-right:18px;letter-spacing:-.02em;}
.tg{font-size:10px;color:#b8a894;margin-bottom:1px;letter-spacing:.05em;font-weight:500;text-transform:uppercase;}
.tco{font-size:9px;color:#c8b8a8;margin-bottom:6px;}
.tm{font-size:10px;color:#b0a090;margin-bottom:8px;letter-spacing:.01em;}
/* ── Member Video ──────────────────────────────────────────── */
#tv-big-wrap{cursor:pointer;border-radius:8px;overflow:hidden;background:rgba(0,0,0,0.05);}
#tv-big-wrap:hover #tv-big{opacity:.84;}
#tv-big{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;transition:opacity .13s;}
#tv-big-title{font-size:8.5px;color:#7a6858;line-height:1.3;padding:3px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
body.night #tv-big-title{color:#4a6080;}
#tv-small-row{display:flex;gap:5px;margin-top:5px;}
.tv-sm{flex:1;cursor:pointer;border-radius:6px;overflow:hidden;background:rgba(0,0,0,0.05);transition:opacity .13s;}
.tv-sm:hover{opacity:.82;}
.tv-sm img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;}
.tv-sm-title{font-size:8.5px;color:#7a6858;line-height:1.3;padding:3px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tv-empty{font-size:11px;color:#c8b8a8;}
body.night .tv-sm-title{color:#4a6080;}
body.night .tv-sm{background:rgba(255,255,255,0.04);}
body.night .tv-empty{color:#2e3e56;}
/* ── YouTube Modal ─────────────────────────────────────────── */
#yt-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:200;align-items:center;justify-content:center;}
#yt-mi{position:relative;width:min(92vw,640px);background:#0e0e0e;border-radius:14px;padding:12px 12px 14px;box-shadow:0 10px 48px rgba(0,0,0,.85);}
#yt-mp{width:100%;padding-bottom:56.25%;position:relative;background:#000;border-radius:8px;overflow:hidden;}
#yt-mp>div,#yt-mp iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}
#yt-mc{position:absolute;top:-14px;right:-14px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.92);border:none;cursor:pointer;font-size:18px;line-height:1;color:#111;box-shadow:0 2px 8px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;}
#yt-mc:hover{background:#fff;}
#yt-mf{display:none;padding:28px 16px;text-align:center;}
#yt-mfl{font-size:13px;color:#bbb;text-decoration:none;padding:9px 20px;border:1px solid rgba(255,255,255,.22);border-radius:9px;transition:background .15s,color .15s;}
#yt-mfl:hover{background:rgba(255,255,255,.1);color:#fff;}
#yt-mt{font-size:10.5px;color:rgba(255,255,255,.3);margin-top:9px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 4px;}
/* ── Group Card ──────────────────────────────────────────── */
#gc{position:fixed;display:none;max-width:234px;z-index:20;overflow:hidden;pointer-events:all;}
#gc-bar{height:3px;width:100%;}
#gc-inner{padding:12px 16px 14px;}
#gcx{position:absolute;top:11px;right:11px;font-size:15px;color:rgba(158,142,128,0.5);cursor:pointer;line-height:1;}
#gc-name{font-size:15px;font-weight:700;margin-bottom:1px;padding-right:16px;letter-spacing:-.02em;}
#gc-en{font-size:9px;letter-spacing:.1em;color:#b8a894;margin-bottom:10px;text-transform:uppercase;font-weight:500;}
#gc-grid{display:flex;flex-direction:column;gap:5px;margin-top:12px;padding-top:11px;border-top:0.5px solid rgba(150,130,110,0.14);}
#gc-tv{margin-top:12px;}
#gc-grid .row{display:flex;align-items:center;}
body.night #gc-grid{border-top-color:rgba(255,255,255,0.07);}
#gc-grid .lbl{font-size:9px;color:#c0b0a0;min-width:56px;flex-shrink:0;letter-spacing:.02em;}
#gc-grid .val{font-size:10.5px;color:#5a4c3e;font-weight:500;}
/* night overrides */
body.night #tt{color:#a8b8d2;}
body.night #ttx{color:rgba(120,140,175,0.45);}
body.night .tn{color:#d8e4f6;}
body.night .tg{color:#8aa4c8;}
body.night .tco{color:#607898;}
body.night .tm{color:#6080a0;}
body.night .ts a{color:#5e7098;background:rgba(60,80,130,0.13);}
body.night .ts a:hover{background:rgba(60,80,130,0.26);color:#9ab0d0;}
body.night #gc-name{color:#d8e4f6 !important;}
body.night #gc-en{color:#607898 !important;}
body.night #gcx{color:rgba(120,140,175,0.55) !important;}
body.night #gc-grid .lbl{color:#7090b8 !important;}
body.night #gc-grid .val{color:#9aaece !important;}
/* ── Connection Card ─────────────────────────────────────── */
#lc{position:fixed;display:none;max-width:176px;z-index:20;overflow:hidden;pointer-events:all;}
#lc-bar{height:3px;width:100%;}
#lc-inner{padding:11px 15px 13px;}
#lcx{position:absolute;top:10px;right:11px;font-size:15px;color:rgba(158,142,128,0.5);cursor:pointer;line-height:1;}
#lc-pair{display:flex;align-items:center;gap:6px;margin-bottom:3px;padding-right:16px;}
.lc-name{font-size:13px;font-weight:700;color:#241c14;letter-spacing:-.02em;}
.lc-sep{font-size:10px;color:#c8b8a8;flex-shrink:0;letter-spacing:.04em;}
#lc-grp{font-size:9px;color:#b8a894;letter-spacing:.05em;text-transform:uppercase;font-weight:500;margin-bottom:9px;}
#lc-links{margin-top:8px;padding-top:8px;border-top:0.5px solid rgba(150,130,110,0.14);}
#lc-links a{font-size:10.5px;color:#9a8878;text-decoration:none;padding:5px 9px;border-radius:8px;background:rgba(160,140,120,0.08);display:block;margin-bottom:3px;letter-spacing:.01em;transition:background .13s,color .13s;}
#lc-links a:hover{background:rgba(160,140,120,0.18);color:#4a3626;}
#lc-links .lc-empty{font-size:10px;color:#c8b8a8;padding:2px 1px;}
body.night #lcx{color:rgba(120,140,175,0.45);}
body.night .lc-name{color:#d8e4f6;}
body.night .lc-sep{color:#2e3e58;}
body.night #lc-grp{color:#384a64;}
body.night #lc-links{border-top-color:rgba(255,255,255,0.07);}
body.night #lc-links a{color:#5e7098;background:rgba(60,80,130,0.13);}
body.night #lc-links a:hover{background:rgba(60,80,130,0.26);color:#9ab0d0;}
body.night #lc-links .lc-empty{color:#2e3e56;}
/* ── Connection Toggle ───────────────────── */
#conn-sw{position:absolute;top:11px;left:196px;width:72px;height:32px;background:rgba(210,200,188,0.38);border-radius:16px;box-shadow:inset 0 1.5px 4px rgba(100,80,60,0.2);cursor:pointer;display:flex;align-items:center;padding:3px;box-sizing:border-box;pointer-events:all;}
#conn-knob{width:30px;height:26px;border-radius:13px;background:rgba(250,246,240,0.96);box-shadow:0 1.5px 4px rgba(100,80,60,0.24);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#7a6858;letter-spacing:.03em;transition:transform 0.22s cubic-bezier(0.34,1.56,0.64,1);flex-shrink:0;user-select:none;}
#conn-knob.on{transform:translateX(36px);}
#conn-off{position:absolute;right:7px;font-size:8px;font-weight:700;color:rgba(140,120,100,0.65);pointer-events:none;letter-spacing:.03em;transition:opacity .15s;}
#conn-sw.on #conn-off{opacity:0;}
body.night #conn-sw{background:rgba(40,50,80,0.55);box-shadow:inset 0 1.5px 4px rgba(0,0,0,0.4);}
body.night #conn-knob{background:rgba(40,55,90,0.95);color:#a0b0d0;}
/* ── Settings Button ─────────────────────────── */
#cfg-btn{position:absolute;top:11px;left:278px;width:32px;height:32px;border-radius:50%;background:rgba(210,200,188,0.38);box-shadow:inset 0 1.5px 4px rgba(100,80,60,0.2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:#7a6858;pointer-events:all;user-select:none;transition:background .15s,color .15s;border:none;}
#cfg-btn:hover,#cfg-btn.open{background:rgba(200,190,178,0.60);}
body.night #cfg-btn{background:rgba(40,50,80,0.55);box-shadow:inset 0 1.5px 4px rgba(0,0,0,0.4);color:#a0b0d0;}
body.night #cfg-btn:hover,body.night #cfg-btn.open{background:rgba(50,65,105,0.68);}
/* ── Settings Panel ──────────────────────────── */
#cfg-panel{position:fixed;top:52px;left:14px;display:none;width:264px;background:rgba(252,249,244,0.52);backdrop-filter:blur(36px) saturate(200%);-webkit-backdrop-filter:blur(36px) saturate(200%);border:0.5px solid rgba(255,255,255,0.82);border-radius:16px;box-shadow:0 1.5px 0 rgba(255,255,255,0.95) inset,0 8px 30px rgba(80,58,38,0.13),0 2px 6px rgba(80,58,38,0.07);padding:14px 16px 16px;z-index:30;pointer-events:all;}
body.night #cfg-panel{background:rgba(16,20,36,0.58);border-color:rgba(255,255,255,0.10);box-shadow:0 1px 0 rgba(255,255,255,0.06) inset,0 8px 32px rgba(0,0,0,0.55);}
.cfg-sec{margin-bottom:13px;}
.cfg-sec:last-child{margin-bottom:0;}
.cfg-lbl{font-size:9px;font-weight:700;letter-spacing:.08em;color:#b8a894;text-transform:uppercase;margin-bottom:7px;}
body.night .cfg-lbl{color:#364a68;}
.cfg-dslider{display:flex;align-items:center;gap:6px;}
.cfg-dtrack-wrap{flex:1;position:relative;height:16px;user-select:none;}
.cfg-dtrack-bg{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:3px;border-radius:2px;background:rgba(160,140,120,0.28);}
body.night .cfg-dtrack-bg{background:rgba(60,80,130,0.30);}
.cfg-dtrack-fill{position:absolute;top:50%;transform:translateY(-50%);height:3px;border-radius:2px;background:rgba(115,95,75,0.42);left:0;width:100%;}
body.night .cfg-dtrack-fill{background:rgba(85,115,190,0.50);}
.cfg-thumb{-webkit-appearance:none;appearance:none;position:absolute;left:0;top:50%;transform:translateY(-50%);width:100%;height:16px;background:transparent;border:none;outline:none;pointer-events:none;margin:0;padding:0;}
.cfg-thumb::-webkit-slider-runnable-track{-webkit-appearance:none;height:3px;background:transparent;border:none;}
.cfg-thumb::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:7px;margin-top:-5.5px;background:rgba(250,246,240,0.96);border:0.5px solid rgba(160,140,120,0.4);box-shadow:0 1px 4px rgba(80,60,40,0.22);cursor:pointer;pointer-events:all;}
body.night .cfg-thumb::-webkit-slider-thumb{background:rgba(40,55,90,0.95);border-color:rgba(120,140,180,0.35);}
.cfg-dval{font-size:10px;font-weight:600;color:#5a4c3e;min-width:30px;flex-shrink:0;text-align:center;letter-spacing:-.01em;}
body.night .cfg-dval{color:#7090b8;}
.cfg-gender{display:flex;gap:5px;}
.cfg-gtag{padding:4px 10px;border-radius:10px;font-size:9px;font-weight:700;letter-spacing:.04em;cursor:pointer;background:rgba(160,140,120,0.10);color:#9a8870;border:0.5px solid rgba(160,140,120,0.20);transition:background .13s,color .13s;user-select:none;}
.cfg-gtag.sel{background:rgba(120,100,82,0.20);color:#4a3626;border-color:rgba(120,100,82,0.32);}
body.night .cfg-gtag{background:rgba(60,80,130,0.12);color:#6080b0;border-color:rgba(80,100,160,0.18);}
body.night .cfg-gtag.sel{background:rgba(80,110,190,0.26);color:#a0bce0;border-color:rgba(100,130,210,0.36);}
#cfg-active-wrap{display:flex;align-items:center;gap:8px;font-size:10px;color:#6a5848;}
body.night #cfg-active-wrap{color:#6080a8;}
#cfg-active-sw{width:36px;height:20px;border-radius:10px;background:rgba(210,200,188,0.38);box-shadow:inset 0 1px 3px rgba(100,80,60,0.2);cursor:pointer;position:relative;flex-shrink:0;transition:background .2s;}
#cfg-active-sw.on{background:rgba(90,150,100,0.42);}
#cfg-active-knob{position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:7px;background:rgba(250,246,240,0.96);box-shadow:0 1px 3px rgba(80,60,40,0.22);transition:transform .2s cubic-bezier(0.34,1.56,0.64,1);}
#cfg-active-sw.on #cfg-active-knob{transform:translateX(16px);}
body.night #cfg-active-sw{background:rgba(40,50,80,0.55);}
body.night #cfg-active-sw.on{background:rgba(50,110,80,0.48);}
body.night #cfg-active-knob{background:rgba(40,55,90,0.95);}
#cfg-reset{width:100%;margin-top:10px;padding:7px 0;border:none;border-radius:10px;background:rgba(160,140,120,0.12);color:#7a6858;font-family:inherit;font-size:10px;font-weight:600;letter-spacing:.04em;cursor:pointer;transition:background .15s,color .15s;}
#cfg-reset:hover{background:rgba(160,140,120,0.22);color:#4a3626;}
body.night #cfg-reset{background:rgba(60,80,130,0.18);color:#6080b0;}
body.night #cfg-reset:hover{background:rgba(80,110,190,0.28);color:#a0bce0;}
/* ── Search ──────────────────────────────── */
#srch{position:absolute;top:11px;right:14px;display:flex;align-items:center;gap:5px;pointer-events:all;}
#srch-btn{width:32px;height:32px;border-radius:50%;background:rgba(210,200,188,0.38);box-shadow:inset 0 1.5px 4px rgba(100,80,60,0.2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#7a6858;flex-shrink:0;padding:0;transition:background .15s,color .15s;}
#srch-btn:hover{background:rgba(205,195,183,0.60);}
#srch-bar{height:32px;background:rgba(252,249,244,0.72);backdrop-filter:blur(36px) saturate(200%);-webkit-backdrop-filter:blur(36px) saturate(200%);border:0.5px solid rgba(255,255,255,0.82);border-radius:16px;box-shadow:0 1.5px 0 rgba(255,255,255,0.95) inset,0 4px 16px rgba(80,58,38,0.10);width:0;overflow:hidden;transition:width 0.28s cubic-bezier(0.34,1.2,0.64,1);display:flex;align-items:center;}
#srch-bar.open{width:200px;}
#srch-in{border:none;background:transparent;outline:none;font-family:'Pretendard Variable',Pretendard,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;font-size:11px;color:#4a3c32;padding:0 14px;width:100%;letter-spacing:0.03em;}
#srch-in::placeholder{color:rgba(150,130,110,0.5);}
#srch-drop{position:absolute;top:38px;right:0;min-width:210px;background:rgba(252,249,244,0.95);backdrop-filter:blur(36px) saturate(200%);-webkit-backdrop-filter:blur(36px) saturate(200%);border:0.5px solid rgba(255,255,255,0.82);border-radius:14px;box-shadow:0 1.5px 0 rgba(255,255,255,0.95) inset,0 8px 28px rgba(80,58,38,0.14);display:none;overflow:hidden;max-height:260px;overflow-y:auto;}
.srch-item{padding:8px 14px 7px;cursor:pointer;display:flex;flex-direction:column;gap:1px;transition:background .1s;border-bottom:0.5px solid rgba(150,130,110,0.07);}
.srch-item:last-child{border-bottom:none;}
.srch-item:hover,.srch-item.sel{background:rgba(160,140,120,0.11);}
.srch-nm{font-size:12.5px;font-weight:600;color:#2e2018;letter-spacing:-0.01em;}
.srch-gr{font-size:9px;color:#b8a894;letter-spacing:0.05em;text-transform:uppercase;font-weight:500;margin-top:1px;}
.srch-tag{font-size:8px;font-weight:700;padding:1px 5px;border-radius:4px;background:rgba(160,140,120,0.14);color:#9a8870;letter-spacing:0.07em;flex-shrink:0;}
body.night .srch-tag{background:rgba(80,100,150,0.25);color:#7090c8;}
body.night #srch-btn{background:rgba(40,50,80,0.55);box-shadow:inset 0 1.5px 4px rgba(0,0,0,0.4);color:#a0b0d0;}
body.night #srch-btn:hover{background:rgba(50,65,105,0.68);}
body.night #srch-bar{background:rgba(16,20,36,0.75);border-color:rgba(255,255,255,0.10);box-shadow:0 1px 0 rgba(255,255,255,0.06) inset,0 4px 16px rgba(0,0,0,0.35);}
body.night #srch-in{color:#a8b8d2;}
body.night #srch-in::placeholder{color:rgba(120,140,175,0.4);}

function drawConnections(){
  if(!showConn)return;
  const S={
    member:{dash:[],lw:0.7,a:nightMode?.30:.18},
    collab:{dash:[],lw:1.4,a:nightMode?.55:.48},
    stage:{dash:[4,4],lw:.8,a:nightMode?.30:.24},
    challenge:{dash:[2,8],lw:.55,a:nightMode?.18:.13},
  };
  CONN.forEach(c=>{
    const ma=A.find(m=>m.name.ko===c.a||m.name.en===c.a);
    const mb=A.find(m=>m.name.ko===c.b||m.name.en===c.b);
    if(!ma||!mb)return;
    if(!memberVisible(ma)||!memberVisible(mb))return;
    const ax=emx(ma),ay=emy(ma),bx=emx(mb),by=emy(mb);
    const len=Math.hypot(bx-ax,by-ay);if(len<1)return;
    const s=S[c.type]||S.stage;
    // 베지어 제어점: 선분 수직 방향으로 offset, 지도 중심(3000,3000) 쪽으로 볼록
    const mx2=(ax+bx)/2,my2=(ay+by)/2;
    const px=-(by-ay)/len*len*0.2,py=(bx-ax)/len*len*0.2;
    const dot=(wx(3000)-mx2)*px+(wy(3000)-my2)*py;
    const cpx=mx2+(dot>=0?px:-px),cpy=my2+(dot>=0?py:-py);
    const rgb=c.type==='member'?ma.color:null;
    // 탈퇴 등 inactive 멤버가 포함된 선은 매우 얇고 희미하게
    const dim=ma.active===false||mb.active===false;
    const lw=dim?s.lw*0.5:s.lw;
    const alpha=dim?s.a*0.5:s.a;
    ctx.save();
    ctx.beginPath();ctx.moveTo(ax,ay);ctx.quadraticCurveTo(cpx,cpy,bx,by);
    ctx.setLineDash(s.dash.map(d=>d*Math.max(0.5,sc)));
    ctx.lineWidth=lw;
    ctx.strokeStyle=rgb
      ?`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${alpha})`
      :(nightMode?`rgba(180,200,240,${alpha})`:`rgba(100,82,65,${alpha})`);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  });
}

function wc(x,y,r,rgb,a,seed){
  const rn=n=>{let v=seed+n;return Math.abs(Math.sin(v)*43758.5)%1;};
  for(let i=0;i<4;i++){
    const ox2=(rn(i*3)-.5)*r*.5,oy2=(rn(i*3+1)-.5)*r*.5,rr=r*(.6+rn(i*3+2)*.6)*sc;
    const g=ctx.createRadialGradient(x+ox2*sc,y+oy2*sc,0,x+ox2*sc,y+oy2*sc,rr);
    const a1=a*(.3+rn(i+10)*.5);
    g.addColorStop(0,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${a1})`);
    g.addColorStop(.5,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${a1*.25})`);
    g.addColorStop(1,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0)`);
    ctx.beginPath();ctx.arc(x+ox2*sc,y+oy2*sc,rr,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  }
}

}

function drawGroups(){
  grpCache={};grpLabelCache=[];
  const grps={};
  A.forEach(a=>{
    if(!a.group[lang])return;
    if(a._fade===0)return;
    // 이중소속(·구분) 멤버는 두 그룹 원 계산에 모두 포함
    const koNames=a.group.ko.includes('·')?a.group.ko.split('·').map(s=>s.trim()):[a.group.ko];
    koNames.forEach(kn=>{const k=`${a.planet}__${kn}`;if(!grps[k])grps[k]=[];grps[k].push(a);});
  });
  const circ=[];
  Object.entries(grps).forEach(([k,mem])=>{
    if(mem.length===0)return;
    const pid=k.split('__')[0],grpKo=k.split('__')[1],isL=PLANETS.find(p=>p.id===pid)?.legacy;
    const pts=mem.map(m=>[wx(m.x),wy(m.y)]);
    const mx=pts.reduce((s,p)=>s+p[0],0)/pts.length,my=pts.reduce((s,p)=>s+p[1],0)/pts.length;
    const r=Math.max(...pts.map(p=>Math.hypot(p[0]-mx,p[1]-my)))+16*sc;
    circ.push({k,grpKo,isL,mem,mx,my,r});
  });
  // ── 그룹 원 충돌 분리 (NCT 127 ↔ NCT Dream 겹침은 허용, 모션 없이 즉시 수렴)
  {
    const ALLOW=new Set(['main__NCT 127|main__NCT Dream','main__NCT Dream|main__NCT 127']);
    const FIXED=new Set(['main__NCT 127','main__NCT Dream']);
    const mc=circ.filter(c=>!c.isL);
    const tmp={};mc.forEach(c=>{tmp[c.k]={dx:0,dy:0};});
    for(let iter=0;iter<30;iter++){
      for(let i=0;i<mc.length;i++){for(let j=i+1;j<mc.length;j++){
        const ci=mc[i],cj=mc[j];
        if(ALLOW.has(`${ci.k}|${cj.k}`))continue;
        const ax=ci.mx+tmp[ci.k].dx,ay=ci.my+tmp[ci.k].dy;
        const bx=cj.mx+tmp[cj.k].dx,by=cj.my+tmp[cj.k].dy;
        const ddx=ax-bx,ddy=ay-by;
        const dist=Math.hypot(ddx,ddy)||0.01;
        const minD=ci.r+cj.r+4*sc;
        if(dist<minD){
          const push=(minD-dist)*0.5,nx=ddx/dist,ny=ddy/dist;
          if(!FIXED.has(ci.k)){tmp[ci.k].dx+=nx*push;tmp[ci.k].dy+=ny*push;}
          if(!FIXED.has(cj.k)){tmp[cj.k].dx-=nx*push;tmp[cj.k].dy-=ny*push;}
        }
      }}
    }
    // circ 센터 갱신 + grpDelta 저장 (멤버 렌더링에 적용)
    mc.forEach(({k})=>{const t=tmp[k];grpDelta[k]=t;const c=circ.find(x=>x.k===k);if(c){c.mx+=t.dx;c.my+=t.dy;}});
  }
  // 1차: 원 그리기
  circ.forEach(({k,grpKo,isL,mem,mx,my,r})=>{
    if(mx+r<0||mx-r>W||my+r<0||my-r>H)return;
    const rgb=(GI[grpKo]||{color:mem[0].color}).color;
    ctx.beginPath();ctx.arc(mx,my,r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(${rgb[0]-15},${rgb[1]-15},${rgb[2]-15},.14)`;
    ctx.lineWidth=.5;ctx.setLineDash([2*sc,2*sc]);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},.05)`;ctx.fill();
    grpCache[k]={cx:mx,cy:my,r:r};
  });
  // 2차: 레이블 — 다른 원 밖 위치 탐색 (위→아래→왼→오른 순)
  circ.forEach(({k,grpKo,isL,mem,mx,my,r})=>{
    if(isL||mx+r<0||mx-r>W||my+r<0||my-r>H)return;
    const rgb=(GI[grpKo]||{color:mem[0].color}).color;
    const fs=Math.max(6,Math.min(12,10*sc));
    ctx.fillStyle=`rgba(${rgb[0]-40},${rgb[1]-40},${rgb[2]-40},.38)`;
    ctx.font=`${fs}px 'Pretendard Variable',Pretendard,'Apple SD Gothic Neo',sans-serif`;ctx.textAlign='center';
    const lbl=lang==='ko'?grpKo:(GI[grpKo]?.en||grpKo);
    const cands=[[mx,my-r-4*sc],[mx,my+r+fs+4*sc],[mx-r-16*sc,my],[mx+r+16*sc,my]];
    const pos=cands.find(([lx,ly])=>!circ.some(c=>c.k!==k&&Math.hypot(lx-c.mx,ly-c.my)<c.r))||cands[0];
    ctx.fillText(lbl,pos[0],pos[1]);
    const tw=ctx.measureText(lbl).width,pad=6*sc;
    grpLabelCache.push({grpKo,lx:pos[0]-tw/2-pad,ly:pos[1]-fs-pad,w:tw+pad*2,h:fs+pad*2});
  });

  // NCT 상위 그룹 경계 (NCT 127 + Dream + WISH + WayV)
  const nctNames=['NCT 127','NCT Dream','NCT WISH','WayV','NCT 127','NCT Dream','NCT WISH','WayV'];
  const nctEn=['NCT 127','NCT Dream','NCT WISH','WayV'];
  const nctMembers=A.filter(a=>{const en=a.group.en;return (nctEn.includes(en)||nctEn.some(n=>en.includes(n)))&&a.planet==='main'&&memberVisible(a);});
  if(nctMembers.length>0){
    const pts=nctMembers.map(m=>[emx(m),emy(m)]);
    const mx=pts.reduce((s,p)=>s+p[0],0)/pts.length;
    const my=pts.reduce((s,p)=>s+p[1],0)/pts.length;
    const r=Math.max(...pts.map(p=>Math.hypot(p[0]-mx,p[1]-my)))+30*sc;
    ctx.beginPath();ctx.arc(mx,my,r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(165,185,210,0.16)`;
    ctx.lineWidth=.6;ctx.setLineDash([5*sc,4*sc]);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='rgba(165,185,210,0.03)';ctx.fill();
    const fs=Math.max(7,Math.min(13,11*sc));
    ctx.font=`${fs}px 'Pretendard Variable',Pretendard,'Apple SD Gothic Neo',sans-serif`;ctx.textAlign='center';
    ctx.fillStyle='rgba(135,158,192,0.40)';
    ctx.fillText(lang==='ko'?'NCT':'NCT',mx,my-r-5*sc);
  }
}

function sparkle(px,py,t){
  const br=16*sc, p=.5+.5*Math.sin(t*.003);
  // 외곽 헤일로 - 넓고 옅게
  const g1=ctx.createRadialGradient(px,py,0,px,py,br*5);
  g1.addColorStop(0,`rgba(255,252,235,${.28*p})`);
  g1.addColorStop(.3,`rgba(255,245,210,${.16*p})`);
  g1.addColorStop(1,'rgba(255,240,200,0)');
  ctx.beginPath();ctx.arc(px,py,br*5,0,Math.PI*2);ctx.fillStyle=g1;ctx.fill();
  // 중간 글로우
  const g2=ctx.createRadialGradient(px,py,0,px,py,br*2.5);
  g2.addColorStop(0,`rgba(255,255,245,${.45*p})`);
  g2.addColorStop(.45,`rgba(255,248,220,${.26*p})`);
  g2.addColorStop(1,'rgba(255,242,200,0)');
  ctx.beginPath();ctx.arc(px,py,br*2.5,0,Math.PI*2);ctx.fillStyle=g2;ctx.fill();
  // 코어 - 흰빛
  const g3=ctx.createRadialGradient(px,py,0,px,py,br*1.1);
  g3.addColorStop(0,`rgba(255,255,255,${.72*p})`);
  g3.addColorStop(.4,`rgba(255,252,235,${.45*p})`);
  g3.addColorStop(1,'rgba(255,248,220,0)');
  ctx.beginPath();ctx.arc(px,py,br*1.1,0,Math.PI*2);ctx.fillStyle=g3;ctx.fill();
}

function draw(t){
  ctx.clearRect(0,0,W,H);
  const FADE=0.07;
  A.forEach(a=>{const tgt=memberVisible(a)?1:0;if(a._fade<tgt)a._fade=Math.min(1,a._fade+FADE);else if(a._fade>tgt)a._fade=Math.max(0,a._fade-FADE);});
  drawBg();drawPlanets();drawGroups();drawConnections();
  A.forEach(a=>{if(a._fade===0)return;if(a.sparkle)sparkle(emx(a),emy(a),t);});
  A.forEach((a,i)=>{
    if(a._fade===0)return;
    const fd=a._fade;
    const px=emx(a),py=emy(a);
    if(px<-50||px>W+50||py<-50||py>H+50)return;
    const br=(10+a.sat*11)*sc,rgb=a.color;
    const b=[Math.min(255,rgb[0]-a.sat*24),Math.min(255,rgb[1]-a.sat*16),Math.min(255,rgb[2]-a.sat*12)];
    if(a.active){wc(px,py,br*1.2/sc,rgb,a.op*.28*fd,i*100);wc(px,py,br*.8/sc,b,a.op*.52*fd,i*100+1);wc(px,py,br*.35/sc,[b[0]-8,b[1]-8,b[2]-8],a.op*.40*fd,i*100+2);}
    else{wc(px,py,br*.8/sc,rgb,a.op*.22*fd,i*100);for(let j=0;j<7;j++){const a2=j/7*Math.PI*2;ctx.beginPath();ctx.arc(px+Math.cos(a2)*(br*.5),py+Math.sin(a2)*(br*.5),sc,0,Math.PI*2);ctx.fillStyle=`rgba(${rgb[0]-10},${rgb[1]-10},${rgb[2]-10},${a.op*.35*fd})`;ctx.fill();}}
    const fs=Math.max(5,Math.min(13,(7.5+a.sat)*sc));
    ctx.fillStyle=nightMode?`rgba(150,165,188,${(a.active?.52:.20)*fd})`:`rgba(55,45,40,${(a.active?.64:.24)*fd})`;ctx.font=`${fs}px 'Pretendard Variable',Pretendard,'Apple SD Gothic Neo',sans-serif`;ctx.textAlign='center';
    ctx.fillText(a.name[lang],px,py+br+6*sc);
  });
  drawHilite();
}

function findGroupLabel(mx,my){
  for(const lb of grpLabelCache){if(mx>=lb.lx&&mx<=lb.lx+lb.w&&my>=lb.ly&&my<=lb.ly+lb.h)return lb.grpKo;}
  return null;
}
function findGroup(mx,my){
  for(const [k,v] of Object.entries(grpCache)){
    const dx=mx-v.cx,dy=my-v.cy;
    if(dx*dx+dy*dy<v.r*v.r)return k.split('__')[1];
  }
  return null;
}

function findConn(mx,my){
  if(!showConn)return null;
  for(const c of CONN){
    const ma=A.find(m=>m.name.ko===c.a||m.name.en===c.a);
    const mb=A.find(m=>m.name.ko===c.b||m.name.en===c.b);
    if(!ma||!mb)continue;
    if(!memberVisible(ma)||!memberVisible(mb))continue;
    const ax=emx(ma),ay=emy(ma),bx=emx(mb),by=emy(mb);
    const len=Math.hypot(bx-ax,by-ay);if(len<1)continue;
    const mx2=(ax+bx)/2,my2=(ay+by)/2;
    const px=-(by-ay)/len*len*0.2,py=(bx-ax)/len*len*0.2;
    const dot=(wx(3000)-mx2)*px+(wy(3000)-my2)*py;
    const cpx=mx2+(dot>=0?px:-px),cpy=my2+(dot>=0?py:-py);
    ctx.save();
    ctx.beginPath();ctx.moveTo(ax,ay);ctx.quadraticCurveTo(cpx,cpy,bx,by);
    ctx.lineWidth=12;
    const hit=ctx.isPointInStroke(mx,my);
    ctx.restore();
    if(hit)return{c,ma,mb};
  }
  return null;
}

// 듀얼 범위 슬라이더 초기화
function initDS(loId,hiId,fillId,minVId,maxVId,cb){
  const lo=document.getElementById(loId),hi=document.getElementById(hiId);
  const fill=document.getElementById(fillId);
  const minV=document.getElementById(minVId),maxV=document.getElementById(maxVId);
  function update(){
    const mn=parseInt(lo.min),mx=parseInt(lo.max);
    let loV=parseInt(lo.value),hiV=parseInt(hi.value);
    if(loV>hiV){loV=hiV;lo.value=loV;}
    if(hiV<loV){hiV=loV;hi.value=hiV;}
    const pLo=(loV-mn)/(mx-mn)*100,pHi=(hiV-mn)/(mx-mn)*100;
    fill.style.left=pLo+'%';fill.style.width=(pHi-pLo)+'%';
    minV.textContent=loV;maxV.textContent=hiV;
    lo.style.zIndex=loV>=hiV?5:3;hi.style.zIndex=2;
    if(cb)cb(loV,hiV);
  }
  lo.addEventListener('input',update);hi.addEventListener('input',update);
  update();
}
initDS('cfg-debut-lo','cfg-debut-hi','cfg-debut-fill','cfg-debut-min-v','cfg-debut-max-v',(lo,hi)=>{fDebutMin=lo;fDebutMax=hi;});
initDS('cfg-bday-lo','cfg-bday-hi','cfg-bday-fill','cfg-bday-min-v','cfg-bday-max-v',(lo,hi)=>{fBdayMin=lo;fBdayMax=hi;});

// ── Search ──────────────────────────────────
let hilite=null,flyGen=0;
const srchBtn=document.getElementById('srch-btn');
const srchBar=document.getElementById('srch-bar');
const srchIn=document.getElementById('srch-in');
const srchDrop=document.getElementById('srch-drop');
let srchOpen=false,srchIdx=-1,srchRes=[];

// GI 영문 키 그룹의 한국어 검색 alias
const GRP_KO_ALIAS={
  'NCT 127':'엔씨티 127 엔시티 127 엔시티',
  'NCT Dream':'엔씨티 드림 엔시티 드림 엔씨티',
  'WayV':'웨이션브이 웨이브 엔씨티',
  'NCT WISH':'엔씨티 위시 엔시티 위시 엔씨티',
  'TXT':'투모로우바이투게더 투바투'
};

// 그룹 검색 목록 (world 좌표 중심)
const GRP_SRCH=Object.entries(GI).map(([ko,info])=>{
  const mems=A.filter(a=>a.group.ko===ko);
  if(!mems.length)return null;
  const cx=mems.reduce((s,a)=>s+a.x,0)/mems.length;
  const cy=mems.reduce((s,a)=>s+a.y,0)/mems.length;
  return {type:'group',name:{ko,en:info.en},alias:GRP_KO_ALIAS[ko]||'',x:cx,y:cy};
}).filter(Boolean);

function srchToggle(){
  srchOpen=!srchOpen;
  if(srchOpen){srchBar.classList.add('open');setTimeout(()=>srchIn.focus(),290);}
  else{srchBar.classList.remove('open');srchHide();srchIn.value='';srchRes=[];srchIdx=-1;}
}
srchBtn.addEventListener('click',e=>{e.stopPropagation();srchToggle();});

function srchFilter(q){
  if(!q.trim()){srchHide();return;}
  const lq=q.toLowerCase();
  const grpRes=GRP_SRCH.filter(g=>g.name.ko.toLowerCase().includes(lq)||g.name.en.toLowerCase().includes(lq)||g.alias.includes(lq)).slice(0,4);
  const memRes=A.filter(a=>a.name.ko.toLowerCase().includes(lq)||a.name.en.toLowerCase().includes(lq)).map(a=>({...a,type:'member'})).slice(0,6);
  srchRes=[...grpRes,...memRes].slice(0,9);
  srchIdx=-1;srchRender();
}

function srchRender(){
  srchDrop.innerHTML='';
  if(!srchRes.length){srchHide();return;}
  srchRes.forEach((a,i)=>{
    const el=document.createElement('div');
    el.className='srch-item'+(i===srchIdx?' sel':'');
    if(a.type==='group'){
      const info=GI[a.name.ko];
      el.innerHTML=`<div style="display:flex;align-items:center;gap:5px"><span class="srch-nm">${a.name[lang]}</span><span class="srch-tag">${lang==='ko'?'그룹':'group'}</span></div>${info?`<span class="srch-gr">${info.co}</span>`:''}`;
    } else {
      el.innerHTML=`<span class="srch-nm">${a.name[lang]}</span><span class="srch-gr">${a.group[lang]}</span>`;
    }
    el.addEventListener('mousedown',e=>{e.preventDefault();srchSelect(i);});
    srchDrop.appendChild(el);
  });
  srchDrop.style.display='block';
}

function srchHide(){srchDrop.style.display='none';srchIdx=-1;}

function srchSelect(i){
  const a=srchRes[i];if(!a)return;
  srchBar.classList.remove('open');srchHide();srchIn.value='';srchOpen=false;srchRes=[];
  if(a.type==='group')flyToGroup(a);else flyTo(a);
}

srchIn.addEventListener('input',function(){srchFilter(this.value);});
srchIn.addEventListener('blur',()=>setTimeout(srchHide,200));
srchIn.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'){e.preventDefault();srchIdx=Math.min(srchIdx+1,srchRes.length-1);srchRender();}
  else if(e.key==='ArrowUp'){e.preventDefault();srchIdx=Math.max(srchIdx-1,-1);srchRender();}
  else if(e.key==='Enter'){e.preventDefault();if(srchIdx>=0)srchSelect(srchIdx);else if(srchRes.length)srchSelect(0);}
  else if(e.key==='Escape'){srchToggle();}
});

function flyTo(a){
  closeAll();
  const gen=++flyGen;
  const tSc=Math.max(0.80,sc>1.1?sc:0.80);
  const tOx=W/2-a.x*tSc,tOy=H/2-a.y*tSc;
  const sSc=sc,sOx=ox,sOy=oy;
  const dur=680,t0=performance.now();
  function step(now){
    if(gen!==flyGen)return;
    const p=Math.min(1,(now-t0)/dur);
    const e=1-Math.pow(1-p,3);
    sc=sSc+(tSc-sSc)*e;ox=sOx+(tOx-sOx)*e;oy=sOy+(tOy-sOy)*e;
    if(p<1){requestAnimationFrame(step);}
    else{sc=tSc;ox=tOx;oy=tOy;hilite={type:'member',a,t0:performance.now()};showT(a,W/2,H/2,true);gc.style.display='none';}
  }
  requestAnimationFrame(step);
}

function flyToGroup(g){
  closeAll();
  const gen=++flyGen;
  const tSc=Math.max(0.80,sc>1.1?sc:0.80);
  const tOx=W/2-g.x*tSc,tOy=H/2-g.y*tSc;
  const sSc=sc,sOx=ox,sOy=oy;
  const dur=680,t0=performance.now();
  function step(now){
    if(gen!==flyGen)return;
    const p=Math.min(1,(now-t0)/dur);
    const e=1-Math.pow(1-p,3);
    sc=sSc+(tSc-sSc)*e;ox=sOx+(tOx-sOx)*e;oy=sOy+(tOy-sOy)*e;
    if(p<1){requestAnimationFrame(step);}
    else{sc=tSc;ox=tOx;oy=tOy;hilite={type:'group',x:g.x,y:g.y,t0:performance.now()};showGC(g.name.ko,W/2,H/2);}
  }
  requestAnimationFrame(step);
}

function drawHilite(){
  if(!hilite)return;
  const elapsed=performance.now()-hilite.t0;
  const isGrp=hilite.type==='group';
  const maxT=isGrp?2400:1800;
  if(elapsed>maxT){hilite=null;return;}
  const hx=isGrp?hilite.x:hilite.a.x;
  const hy=isGrp?hilite.y:hilite.a.y;
  if(!isGrp&&!memberVisible(hilite.a))return;
  const px=wx(hx),py=wy(hy);
  const p=elapsed/maxT;
  const ease=1-Math.pow(1-p,2);
  const baseR=isGrp?30:10,maxR=isGrp?90:42;
  const r1=(baseR+ease*maxR)*sc,op1=(nightMode?0.28:0.14)*(1-p);
  ctx.beginPath();ctx.arc(px,py,r1,0,Math.PI*2);
  ctx.strokeStyle=nightMode?`rgba(180,210,255,${op1})`:`rgba(100,75,50,${op1})`;
  ctx.lineWidth=Math.max(0.5,(isGrp?2.2:1.6)*(1-p));ctx.stroke();
  if(p>0.14){
    const p2=(p-0.14)/0.86,e2=1-Math.pow(1-p2,2);
    const r2=(baseR+e2*maxR)*sc,op2=(nightMode?0.16:0.08)*(1-p2);
    ctx.beginPath();ctx.arc(px,py,r2,0,Math.PI*2);
    ctx.strokeStyle=nightMode?`rgba(160,195,245,${op2})`:`rgba(120,92,62,${op2})`;
    ctx.lineWidth=Math.max(0.3,(isGrp?1.2:0.9)*(1-p2));ctx.stroke();
  }
}
